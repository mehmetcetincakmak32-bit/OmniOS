<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniOS Simulator</title>
<meta name="description" content="OmniOS - Tek OS, Tüm Platformlar">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a23;font-family:'Inter',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
  .phone{width:380px;height:700px;background:#1a1a2e;border-radius:40px;padding:12px;position:relative;box-shadow:0 0 60px rgba(100,255,218,0.08),0 20px 60px rgba(0,0,0,0.5);border:1px solid #333355}
  .phone-inner{width:100%;height:100%;background:#0d0d24;border-radius:32px;overflow:hidden;position:relative;display:flex;flex-direction:column}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:28px;background:#0d0d24;border-radius:0 0 16px 16px;z-index:10;display:flex;justify-content:center;align-items:center;gap:8px}
  .notch-dot{width:8px;height:8px;background:#1a1a3e;border-radius:50%;border:1px solid #2a2a5e}
  .status-bar{display:flex;justify-content:space-between;padding:6px 20px 4px;color:#fff;font-size:12px;font-weight:500;position:relative;z-index:5;background:#0d0d24}
  .status-left{display:flex;align-items:center;gap:6px}
  .status-right{display:flex;align-items:center;gap:6px}
  .os-badge{background:#64ffda;color:#0a0a23;font-size:8px;font-weight:700;padding:1px 6px;border-radius:4px;letter-spacing:0.5px}
  .screen{flex:1;overflow:hidden;position:relative;background:#0a0a23}
  .page{position:absolute;top:0;left:0;width:100%;height:100%;overflow-y:auto;transition:transform .35s cubic-bezier(0.4,0,0.2,1),opacity .35s}
  .page.hidden{transform:translateX(100%);opacity:0;pointer-events:none}
  .page.active{transform:translateX(0);opacity:1}
  .nav-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 24px;background:#0a0a23;border-top:1px solid #1a1a3e}
  .nav-btn{color:#fff;font-size:20px;cursor:pointer;padding:4px 8px;border-radius:8px;transition:.2s;background:none;border:none}
  .nav-btn:hover{background:#1a1a3e}
  .nav-btn.active{color:#64ffda}
  .mode-btn{font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;cursor:pointer;transition:.3s;border:1px solid #64ffda;color:#64ffda;background:transparent;letter-spacing:0.5px}
  .mode-btn:hover{background:#64ffda;color:#0a0a23}

  /* Normal Mode */
  .normal-screen{padding:12px}
  .section-title{color:#64ffda;font-size:11px;font-weight:600;margin:12px 0 6px 12px;letter-spacing:0.5px;text-transform:uppercase}
  .app-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:0 4px}
  .app-icon{display:flex;flex-direction:column;align-items:center;padding:8px 4px;cursor:pointer;border-radius:12px;transition:.2s}
  .app-icon:hover{background:#1a1a3e}
  .app-icon:active{transform:scale(0.92)}
  .app-icon-box{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:3px}
  .app-icon span.name{font-size:9px;color:#c0c0d0;text-align:center;line-height:1.2;font-weight:500}
  .platform-dot{font-size:6px;margin-top:1px}
  .filter-bar{display:flex;gap:6px;padding:8px 12px 4px}
  .filter-btn{font-size:10px;padding:4px 12px;border-radius:12px;cursor:pointer;transition:.2s;border:1px solid #2a2a5e;color:#888;background:transparent;font-weight:500}
  .filter-btn.active{background:#64ffda;color:#0a0a23;border-color:#64ffda;font-weight:600}
  .filter-btn:hover:not(.active){border-color:#64ffda;color:#64ffda}

  /* Flow Mode */
  .flow-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:20px}
  .flow-time{font-size:56px;font-weight:300;color:#fff;letter-spacing:-2px}
  .flow-date{font-size:12px;color:#666;margin-top:2px}
  .flow-gestures{display:flex;gap:8px;margin-top:24px;flex-wrap:wrap;justify-content:center}
  .gesture-card{background:#0d0d24;border:1px solid #1a1a3e;border-radius:12px;padding:10px 14px;text-align:center;min-width:80px;transition:.3s}
  .gesture-card:hover{background:#1a1a3e;transform:translateY(-2px)}
  .gesture-icon{font-size:22px;margin-bottom:2px}
  .gesture-label{font-size:9px;color:#888}
  .gesture-desc{font-size:8px;color:#555;margin-top:1px}
  .flow-suggestions{margin-top:24px;width:100%;padding:0 20px}
  .flow-suggestions .title{font-size:10px;color:#64ffda;font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
  .suggestion-row{display:flex;gap:8px}
  .suggestion-item{background:#0d0d24;border:1px solid #1a1a3e;border-radius:12px;padding:10px;text-align:center;flex:1;cursor:pointer;transition:.3s}
  .suggestion-item:hover{background:#1a1a3e;border-color:#64ffda}
  .suggestion-item .icon{font-size:22px}
  .suggestion-item .name{font-size:8px;color:#aaa;margin-top:2px}
  .flow-hint{position:absolute;bottom:12px;color:#333;font-size:9px;letter-spacing:1px}

  /* App Detail */
  .app-detail{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:20px}
  .app-detail .big-icon{font-size:64px;margin-bottom:12px}
  .app-detail h2{color:#fff;font-size:20px;font-weight:600;margin-bottom:4px}
  .app-detail .platform-tag{font-size:11px;color:#64ffda;font-weight:500;margin-bottom:16px}
  .app-detail .info-card{background:#0d0d24;border:1px solid #1a1a3e;border-radius:12px;padding:14px 20px;width:100%;max-width:260px;margin-bottom:16px}
  .app-detail .info-row{display:flex;justify-content:space-between;padding:4px 0;font-size:11px;border-bottom:1px solid #1a1a3e}
  .app-detail .info-row:last-child{border:none}
  .app-detail .info-row .label{color:#888}
  .app-detail .info-row .value{color:#e0e0e0;font-weight:500}
  .back-btn{background:#16213e;border:none;color:#fff;padding:8px 28px;border-radius:10px;cursor:pointer;font-size:12px;transition:.2s;font-weight:500}
  .back-btn:hover{background:#1a2a4e}

  /* Scrollbar */
  ::-webkit-scrollbar{width:3px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#333;border-radius:2px}

  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .pulse{animation:pulse 2s infinite}

  @media(max-width:420px){.phone{width:100vw;height:100vh;border-radius:0;padding:0;border:none;box-shadow:none}.phone-inner{border-radius:0}}
</style>
</head>
<body>

<div class="phone" id="phone">
  <div class="notch"><div class="notch-dot"></div><div class="notch-dot"></div></div>
  <div class="phone-inner">
    <div class="status-bar">
      <div class="status-left"><span id="clock">12:00</span><span class="os-badge">OmniOS</span></div>
      <div class="status-right"><span style="color:#4caf50">●</span><span>☁</span><span style="color:#ffeb3b">⚡</span></div>
    </div>

    <div class="screen" id="screen">
      <!-- Normal Mode -->
      <div class="page active" id="normalPage">
        <div class="normal-screen" id="normalContent"></div>
      </div>

      <!-- Flow Mode -->
      <div class="page hidden" id="flowPage">
        <div class="flow-screen" id="flowContent"></div>
      </div>

      <!-- App Detail -->
      <div class="page hidden" id="detailPage">
        <div class="app-detail" id="detailContent"></div>
      </div>
    </div>

    <div class="nav-bar">
      <button class="nav-btn" onclick="goHome()">○</button>
      <span style="color:#1a1a3e">●</span>
      <button class="mode-btn" id="modeToggle" onclick="toggleMode()">◉ Flow</button>
      <span style="color:#1a1a3e">●</span>
      <button class="nav-btn" onclick="goBack()">◁</button>
    </div>
  </div>
</div>

<script>
const APPS = {
  cross: [
    {name:'Phone',icon:'📞',cat:'communication'},{name:'Settings',icon:'⚙️',cat:'system'},
    {name:'Calculator',icon:'🔢',cat:'tools'},{name:'Calendar',icon:'📅',cat:'productivity'},
    {name:'Clock',icon:'⏰',cat:'tools'},{name:'Weather',icon:'🌤️',cat:'tools'},
  ],
  android: [
    {name:'Chrome',icon:'🌐',cat:'internet'},{name:'Maps',icon:'🗺️',cat:'navigation'},
    {name:'Gmail',icon:'✉️',cat:'communication'},{name:'YouTube',icon:'▶️',cat:'media'},
    {name:'Drive',icon:'📁',cat:'productivity'},{name:'Photos',icon:'📸',cat:'media'},
  ],
  ios: [
    {name:'Safari',icon:'🌐',cat:'internet'},{name:'Messages',icon:'💬',cat:'communication'},
    {name:'Camera',icon:'📷',cat:'media'},{name:'Notes',icon:'📝',cat:'productivity'},
    {name:'Music',icon:'🎵',cat:'media'},{name:'Wallet',icon:'💳',cat:'finance'},
  ]
};
const PLATFORM_COLORS = {android:'#3ddc84', ios:'#007aff', cross:'#ff6b6b'};
const PLATFORM_LABELS = {android:'Android (ART)', ios:'iOS (UIKit)', cross:'OmniOS Native'};

let currentMode = 'normal';
let history = [];

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.page').forEach(p=>{
    if(p.id!==id) p.classList.add('hidden');
    else p.classList.remove('hidden');
  });
}

function renderNormal(filter='all'){
  const container = document.getElementById('normalContent');
  let html = `<div class="filter-bar">
    <button class="filter-btn ${filter==='all'?'active':''}" onclick="renderNormal('all')">📱 Tümü</button>
    <button class="filter-btn ${filter==='android'?'active':''}" onclick="renderNormal('android')">🤖 Android</button>
    <button class="filter-btn ${filter==='ios'?'active':''}" onclick="renderNormal('ios')">🍎 iOS</button>
  </div>`;

  if(filter==='all'){
    const sections = [
      {title:'🌐 Platformlar Arası',apps:APPS.cross,platform:'cross'},
      {title:'📱 Android',apps:APPS.android,platform:'android'},
      {title:'📱 iOS',apps:APPS.ios,platform:'ios'},
    ];
    sections.forEach(s=>{
      html += `<div class="section-title">${s.title}</div><div class="app-grid">`;
      s.apps.forEach(a=>{
        html += makeAppIcon(a, s.platform);
      });
      html += `</div>`;
    });
  }else{
    const apps = [...APPS.cross, ...(filter==='android'?APPS.android:APPS.ios)];
    html += `<div class="section-title">${filter==='android'?'🤖 Android Uygulamaları':'🍎 iOS Uygulamaları'}</div><div class="app-grid">`;
    apps.forEach(a=>{
      html += makeAppIcon(a, a.platform||filter);
    });
    html += `</div>`;
  }
  container.innerHTML = html;
}

function makeAppIcon(app, platform){
  const color = PLATFORM_COLORS[platform]||'#ff6b6b';
  return `<div class="app-icon" onclick="openApp('${app.name}','${app.icon}','${platform}')">
    <div class="app-icon-box" style="background:#16213e">${app.icon}</div>
    <span class="name">${app.name}</span>
    <span class="platform-dot" style="color:${color}">●</span>
  </div>`;
}

function renderFlow(){
  const container = document.getElementById('flowContent');
  const now = new Date();
  const days = ['Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi','Pazar'];
  const months = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  const dateStr = `${days[now.getDay()-1]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;

  const gestures = [
    {icon:'⬆️',label:'Yukarı Çek',desc:'Uygulama Menüsü',color:'#ff6b6b'},
    {icon:'➡️',label:'Sağa Kaydır',desc:'Son Uygulamalar',color:'#4ecdc4'},
    {icon:'⬅️',label:'Sola Kaydır',desc:'Bildirimler',color:'#45b7d1'},
    {icon:'⬇️',label:'Aşağı Kaydır',desc:'Hızlı Ayarlar',color:'#96ceb4'},
    {icon:'✌️',label:'Çift Dokun',desc:'Ana Ekran',color:'#ffeaa7'},
  ];

  const allApps = [...APPS.cross, ...APPS.android, ...APPS.ios];
  const suggested = shuffle([...allApps]).slice(0,4);

  let html = `<div class="flow-time">${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}</div>
    <div class="flow-date">${dateStr}</div>
    <div class="flow-gestures">`;
  gestures.forEach(g=>{
    html += `<div class="gesture-card">
      <div class="gesture-icon">${g.icon}</div>
      <div class="gesture-label" style="color:${g.color};font-weight:600">${g.label}</div>
      <div class="gesture-desc">${g.desc}</div>
    </div>`;
  });
  html += `</div><div class="flow-suggestions">
    <div class="title">⚡ Önerilen Uygulamalar</div><div class="suggestion-row">`;
  suggested.forEach(a=>{
    const platform = APPS.cross.includes(a)?'cross':APPS.android.includes(a)?'android':'ios';
    const color = PLATFORM_COLORS[platform];
    html += `<div class="suggestion-item" onclick="openApp('${a.name}','${a.icon}','${platform}')">
      <div class="icon">${a.icon}</div>
      <div class="name" style="color:${color}">${a.name}</div>
    </div>`;
  });
  html += `</div></div><div class="flow-hint pulse">↑ → ↓ ← • Jestlerle keşfet</div>`;
  container.innerHTML = html;
}

function openApp(name, icon, platform){
  history.push('normal');
  showPage('detailPage');
  const color = PLATFORM_COLORS[platform]||'#64ffda';
  const platName = PLATFORM_LABELS[platform]||platform;
  const api = platform==='android'?'35 (Android 14)':platform==='ios'?'18 (iOS 18)':'Native';
  
  document.getElementById('detailContent').innerHTML = `
    <div class="big-icon">${icon}</div>
    <h2>${name}</h2>
    <div class="platform-tag" style="color:${color}">${platName}</div>
    <div class="info-card">
      <div class="info-row"><span class="label">📌 Uygulama</span><span class="value">${name}</span></div>
      <div class="info-row"><span class="label">🌐 Platform</span><span class="value" style="color:${color}">${platName}</span></div>
      <div class="info-row"><span class="label">⚡ Durum</span><span class="value" style="color:#4caf50">● Aktif</span></div>
      <div class="info-row"><span class="label">🔧 API</span><span class="value">${api}</span></div>
      <div class="info-row"><span class="label">📦 Tür</span><span class="value">${platform==='cross'?'Evrensel':platform==='android'?'APK':'IPA'}</span></div>
    </div>
    <button class="back-btn" onclick="goHome()">✖ Ana Ekrana Dön</button>
  `;
}

function toggleMode(){
  currentMode = currentMode==='normal'?'flow':'normal';
  document.getElementById('modeToggle').textContent = currentMode==='normal'?'◉ Flow':'◉ Normal';
  if(currentMode==='normal'){
    showPage('normalPage');
    renderNormal('all');
  }else{
    showPage('flowPage');
    renderFlow();
  }
}

function goHome(){
  showPage(currentMode==='normal'?'normalPage':'flowPage');
  history = [];
}

function goBack(){
  if(history.length>0){
    const prev = history.pop();
    showPage(prev==='normal'?'normalPage':'flowPage');
  }
}

function updateClock(){
  const now = new Date();
  document.getElementById('clock').textContent = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
}

setInterval(updateClock, 10000);
updateClock();
renderNormal('all');

document.addEventListener('keydown', e=>{
  if(e.key==='Escape') goHome();
  if(e.key==='m'||e.key==='M') toggleMode();
});
</script>
</body>
</html>
