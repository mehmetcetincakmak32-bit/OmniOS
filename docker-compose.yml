version: '3.8'

services:
  omnios-cli:
    build: .
    container_name: omnios
    stdin_open: true
    tty: true
    command: python src/main_improved.py
    volumes:
      - .:/omnios

  omnios-test:
    build: .
    container_name: omnios-test
    command: python -m pytest src/tests/test_engine.py -v
    profiles:
      - test

  omnios-bench:
    build: .
    container_name: omnios-bench
    command: python src/tests/benchmark.py
    profiles:
      - bench

  omnios-web:
    build: .
    container_name: omnios-web
    ports:
      - "8080:8080"
    command: python -m http.server 8080 --directory /omnios/web
    profiles:
      - web
