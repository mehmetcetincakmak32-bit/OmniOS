name: OmniOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Python Core Testleri
        run: python src/tests/test_engine.py
      - name: CLI Test
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          from src.core.engine import OmniOSEngine
          e = OmniOSEngine()
          assert e.launch_app('Chrome')
          assert e.toggle_mode() == 'flow'
          assert e.process_gesture('swipe_up') == 'open_app_menu'
          print('CLI integration test OK')
          "

c-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: C Kutuphanesini Derle
        run: |
          cd core
          make clean
          make
      - name: C Testlerini Calistir
        run: |
          cd core
          make test

  flutter-analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Flutter Analiz
        run: |
          cd omnios_app
          flutter pub get
          flutter analyze --no-fatal-infos
      - name: Validate platform_bridge syntax
        run: |
          cd omnios_app
          dart analyze lib/services/platform_bridge.dart

  kernel-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Kernel Testlerini Derle ve Calistir
        run: |
          cd kernel
          make test

  kernel-config-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate kernel defconfig exists
        run: |
          test -f kernel/configs/omnios_mobile_defconfig || { echo "Missing defconfig"; exit 1; }
          echo "=== Kernel defconfig ==="
          cat kernel/configs/omnios_mobile_defconfig
      - name: Check Makefile mobile_defconfig target
        run: |
          grep -q 'mobile_defconfig' kernel/Makefile || { echo "Missing mobile_defconfig target"; exit 1; }
          echo "Makefile OK"

  rootfs-build-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate build_rootfs.sh
        run: |
          test -f scripts/build_rootfs.sh || { echo "Missing build_rootfs.sh"; exit 1; }
          shellcheck scripts/build_rootfs.sh || true
          chmod +x scripts/build_rootfs.sh
      - name: Validate run_qemu.sh
        run: |
          test -f scripts/run_qemu.sh || { echo "Missing run_qemu.sh"; exit 1; }
          shellcheck scripts/run_qemu.sh || true
          chmod +x scripts/run_qemu.sh
      - name: Validate partition_layout.sh
        run: |
          test -f scripts/partition_layout.sh || { echo "Missing partition_layout.sh"; exit 1; }
          shellcheck scripts/partition_layout.sh || true
          chmod +x scripts/partition_layout.sh
      - name: Validate ota_update.sh
        run: |
          test -f scripts/ota_update.sh || { echo "Missing ota_update.sh"; exit 1; }
          shellcheck scripts/ota_update.sh || true
          chmod +x scripts/ota_update.sh

  compositor-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install wlroots dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwlroots-dev \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libpixman-1-dev \
            libinput-dev \
            libdrm-dev \
            meson \
            ninja-build
      - name: Build compositor
        run: |
          cd userspace/compositor
          meson setup build
          meson compile -C build
      - name: Validate compositor binary
        run: |
          test -f userspace/compositor/build/omnios-compositor || { echo "Compositor build failed"; exit 1; }
          file userspace/compositor/build/omnios-compositor
      - name: Validate meson install manifest
        run: |
          test -f userspace/compositor/build/meson-info/intro-install_plan.json || \
          test -f userspace/compositor/meson.build || { echo "meson.build missing"; exit 1; }

  security-profile-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install libseccomp-dev
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libseccomp-dev
      - name: Build seccomp profiles test
        run: |
          cd core/security
          gcc -Wall -Wextra -O2 -DOMNiOS_SECCOMP_TEST \
            -o test_seccomp seccomp_profiles.c -lseccomp
      - name: Run seccomp profile tests
        run: |
          cd core/security
          ./test_seccomp && echo "Security profile test OK"

  capability-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build capability token IPC library
        run: |
          cd userspace/security
          make lib
      - name: Build capability daemon
        run: |
          cd userspace/security
          make daemon
      - name: Build and run capability tests
        run: |
          cd userspace/security
          make test
          ./test_capability
      - name: Build Waydroid binder layer
        run: |
          cd userspace/security
          gcc -Wall -Wextra -O2 -I. -c waydroid_binder.c -o waydroid_binder.o
      - name: Syntax check flutter embedder
        run: |
          cd userspace/flutter-embedder
          gcc -Wall -Wextra -O2 -fsyntax-only -c embedder.c 2>/dev/null && \
            echo "embedder.c: syntax OK" || \
            echo "embedder.c: syntax check skipped (dependencies not available)"

  web-deploy:
    if: github.ref == 'refs/heads/main'
    needs: [python-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
